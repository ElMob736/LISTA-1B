<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reajuste de Preço (15%)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      max-width: 480px;
      margin: 0 auto;
    }

    label {
      display: block;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
      margin-top: 0.25rem;
      box-sizing: border-box;
    }

    button {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #resultado {
      margin-top: 1.5rem;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <h1>Reajuste de Preço (15%)</h1>

  <label for="precoAtual">Preço atual do produto</label>
  <input id="precoAtual" type="number" step="0.01" placeholder="Ex.: 59.90" />

  <button type="button" onclick="calcularReajuste15()">
    Calcular reajuste
  </button>

  <div id="resultado">
    Informe o preço atual e clique em "Calcular reajuste".
  </div>

  <script src="atividade8.js"></script>
</body>
</html>
