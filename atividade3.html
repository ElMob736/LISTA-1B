<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

<script>
let preco = parseFloat(prompt("Digite o preço original do produto:"));

const desconto = 0.10;
const valorDesconto = preco * desconto;
const precoFinal = preco - valorDesconto;

console.log(` O preço original do produto é: R$ ${preco.toFixed(2)}`);
console.log(` O Preço com o desconto fica: R$ ${precoFinal.toFixed(2)}`);
</script>

</body>
</html>
